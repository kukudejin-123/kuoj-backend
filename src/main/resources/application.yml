# 公共配置文件
# 
# 
spring:
  application:
    name: oj_kkdj_backend
  # 默认 dev 环境
  profiles:
    active: dev
  # 支持 swagger3
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  # session 配置
  session:
    # todo 取消注释开启分布式 session（须先配置 Redis）
    # store-type: redis
    # 30 天过期
    timeout: 2592000
  # 数据库配置
  # todo 需替换配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/oj
    username: root
    password: asdf785709076@
  # Redis 配置
  # todo 需替换配置，然后取消注释
  redis:
    database: 1
    host: localhost
    port: 6379
    timeout: 5000
  # Elasticsearch 配置
  # todo 需替换配置，然后取消注释
  elasticsearch:
    uris: http://localhost:9200
#    username: root
#    password: 123456
  # 文件上传
  servlet:
    multipart:
      # 大小限制
      max-file-size: 10MB
server:
  address: 0.0.0.0
  port: 8802
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除的实体字段名
      logic-delete-value: 1 # 逻辑已删除值（默认为 1）
      logic-not-delete-value: 0 # 逻辑未删除值（默认为 0）
# 微信相关
# 如需使用微信登录/公众号功能，请替换以下配置
wx:
  # 微信公众平台
  mp:
    token: your_token_here
    aesKey: your_aesKey_here
    appId: your_appId_here
    secret: your_secret_here
    config-storage:
      http-client-type: HttpClient
      key-prefix: wx
      redis:
        host: 127.0.0.1
        port: 6379
      type: Memory
  # 微信开放平台
  open:
    appId: your_open_appId_here
    appSecret: your_open_appSecret_here
# 对象存储
# 如需使用文件上传功能，请替换以下配置
cos:
  client:
    accessKey: your_accessKey_here
    secretKey: your_secretKey_here
    region: ap-guangzhou
    bucket: your_bucket_name
# 接口文档配置
knife4j:
  enable: true
  openapi:
    title: "接口文档"
    version: 1.0
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.kkdj.kkdj.controller

# 代码沙箱配置
# type 可选值:
#   - example: 本地示例（仅供测试）
#   - remote: 远程自建沙箱（需要自己部署）
#   - judge0: Judge0公共API（开发测试推荐）
#   - piston: Piston自建服务（生产环境推荐）
#   - thirdParty: 第三方沙箱
codesandbox:
  type: judge0
  # remote 类型配置（自建Java沙箱）
  url: http://localhost:8090/executeCode
  # piston 类型配置（自建Piston服务）
  piston-url: http://localhost:2000/api/v2/piston/execute
  # judge0 类型配置（公共API或自建服务）
  judge0-url: https://ce.judge0.com/submissions
logging:
  level:
    com.kkdj: debug  # 开发环境
    # com.kkdj: info  # 生产环境